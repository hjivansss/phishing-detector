<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Scanning Website</title>
        <style>
            body {
                margin: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: Arial;
                background: #f4f6fb;
            }

            .container {
                text-align: center;
            }

            .spinner {
                width: 60px;
                height: 60px;
                border: 6px solid #ddd;
                border-top: 6px solid #3f51b5;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin: auto;
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }

            h2 {
                margin-top: 20px;
            }

            p {
                color: #666;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <div class="spinner"></div>

            <h2>Scanning Website</h2>

            <p>Please wait while we check if the website is safe...</p>
        </div>
    </body>
    <script src="loading.js"></script>
</html>
